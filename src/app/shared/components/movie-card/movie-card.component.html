<div class="group relative overflow-hidden rounded-xl bg-slate-900 transition-all hover:-translate-y-2 hover:shadow-2xl">
  <img [src]="fullImageUrl" [alt]="movie().title" class="h-auto w-full object-cover transition-transform group-hover:scale-110">
  
  <div class="absolute inset-0 flex flex-col justify-end bg-gradient-to-t from-black/90 to-transparent p-4 opacity-0 transition-opacity group-hover:opacity-100">
    <h3 class="text-sm font-bold text-white">{{ movie().title }}</h3>
    <div class="mt-2 flex items-center justify-between">
      <span class="text-xs text-yellow-400">⭐ {{ movie().vote_average.toFixed(1) }}</span>
      <span class="text-xs text-gray-300">{{ movie().release_date | date:'yyyy' }}</span>
    </div>
    <button class="mt-3 w-full rounded-md bg-blue-600 py-1.5 text-xs font-semibold text-white hover:bg-blue-700">
      View Details
    </button>
  </div>
</div>
