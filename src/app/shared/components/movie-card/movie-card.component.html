<div (click)="openMovieDetails()"
  class="group relative overflow-hidden rounded-xl bg-slate-900 transition-all hover:-translate-y-2 hover:shadow-2xl cursor-pointer"
>
  <img
    [src]="getFullImageUrl()"
    [alt]="movie().title"
    class="aspect-[2/3] w-full object-cover transition-transform group-hover:scale-110 duration-500"
  />
  <button (click)="toggleFavourite(movie()); $event.stopPropagation()" 
          class="absolute top-3 right-3 z-10 p-2 rounded-full bg-black/40 backdrop-blur-md border border-white/10 hover:scale-110 transition-all">
    @if (isFav(movie().id)) {
      <span class="text-red-500 drop-shadow-[0_0_5px_rgba(239,68,68,0.8)]">❤️</span>
    } @else {
      <span class="opacity-70 group-hover:opacity-100 transition-opacity">🤍</span>
    }
  </button>
  <div
    class="absolute inset-0 flex flex-col justify-end bg-gradient-to-t from-black/90 to-transparent p-4 opacity-0 transition-opacity group-hover:opacity-100"
  >
    <h3 class="text-sm font-bold text-white">{{ movie().title }}</h3>
    <div class="mt-2 flex items-center justify-between">
      <span class="text-xs text-yellow-400"
        >⭐ {{ movie().vote_average.toFixed(1) }}</span
      >
      <span class="text-xs text-gray-300">{{
        movie().release_date | date: "yyyy"
      }}</span>
    </div>
    <button
      class="mt-3 w-full rounded-md bg-blue-600 py-1.5 text-xs font-semibold text-white hover:bg-blue-700"
    >
      View Details
    </button>
  </div>
</div>
