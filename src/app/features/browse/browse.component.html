<div class="pt-24 min-h-screen bg-[#1d1d1d]">
  <div class="container mx-auto px-6">
    
    <div class="bg-[#282828] p-6 rounded-lg border border-white/5 flex flex-wrap gap-6 items-center mb-10">
      
      <div class="flex flex-col gap-2">
        <label class="text-[10px] uppercase font-black text-gray-500">Genre:</label>
        <select (change)="selectedGenre.set($any($event.target).value); onFilterChange()" 
                class="bg-[#1d1d1d] border border-white/10 text-sm px-4 py-2 rounded focus:border-blue-500 outline-none">
          <option value="">All</option>
          @for (genre of genres(); track genre.id) {
            <option [value]="genre.id">{{ genre.name }}</option>
          }
        </select>
      </div>

      <div class="flex flex-col gap-2">
        <label class="text-[10px] uppercase font-black text-gray-500">Order By:</label>
        <select (change)="sortBy.set($any($event.target).value); onFilterChange()"
                class="bg-[#1d1d1d] border border-white/10 text-sm px-4 py-2 rounded focus:border-blue-500 outline-none">
          <option value="popularity.desc">Popularity</option>
          <option value="primary_release_date.desc">Latest</option>
          <option value="vote_average.desc">Rating</option>
        </select>
      </div>
      
    </div>

    

    @if (isLoading()) {
  <div class="flex h-96 items-center justify-center">
    <div class="h-12 w-12 animate-spin rounded-full border-4 border-white/5 border-t-blue-500"></div>
  </div>
}@if (movies().length === 0 && !isLoading()) {
  <div class="text-center py-20">
    <h3 class="text-2xl text-gray-500 font-black uppercase">No movies found!</h3>
    <p class="text-gray-600">Try adjusting your filters.</p>
  </div>
} @else {
      <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 gap-8">
        @for (movie of movies(); track movie.id) {
          <app-movie-card [movie]="movie" />
        }
      </div>

      @if (movies().length > 0) {
  <div class="mt-16 flex justify-center items-center gap-4 pb-20 font-bold uppercase">
    
    <button (click)="changePage(currentPage() - 1)" 
            [disabled]="currentPage() === 1"
            class="px-6 py-2 border border-white/10 rounded bg-[#282828] text-white hover:text-blue-500 disabled:opacity-30 disabled:hover:text-white transition-all duration-300">
      « Prev
    </button>

    <div class="flex items-center gap-3">
      <span class="text-gray-500 text-xs">Page</span>
      <span class="text-2xl text-blue-500 font-black">{{ currentPage() }}</span>
    </div>

    <button (click)="changePage(currentPage() + 1)"
            class="px-6 py-2 border border-white/10 rounded bg-[#282828] text-white hover:text-blue-500 transition-all duration-300">
      Next »
    </button>
    
  </div>
}
    }
  </div>
</div>
