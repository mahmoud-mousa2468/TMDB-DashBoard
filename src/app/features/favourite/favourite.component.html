<div class="p-8 min-h-screen bg-[#141414]">
  <h1 class="text-3xl font-black text-white mb-8 uppercase tracking-tighter border-l-4 border-blue-500 pl-4">
    My Favourite Movies
  </h1>

  @if (favService.favSignal().length > 0) {
    <div class="grid grid-cols-2 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-6">
      @for (movie of favService.favSignal(); track movie.id) {
        <app-movie-card [movie]="movie"></app-movie-card>
      }
    </div>
  } 
  @else {
    <div class="flex flex-col items-center justify-center py-20 text-center">
      <div class="text-6xl mb-4">🎬</div>
      <h2 class="text-xl font-bold text-gray-400">Your list is empty!</h2>
      <p class="text-gray-600 mb-8">Start adding some movies to see them here.</p>
      <a routerLink="/browse" class="bg-blue-500 text-black px-6 py-2 rounded-full font-black uppercase hover:scale-105 transition">
        Browse Movies
      </a>
    </div>
  }
</div>
