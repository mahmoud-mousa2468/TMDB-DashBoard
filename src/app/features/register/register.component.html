<div class="min-h-[80vh] flex items-center justify-center px-4 py-12">
  <div class="w-full max-w-md bg-[#282828] border border-white/5 p-8 rounded-2xl shadow-2xl transition-all hover:border-blue-500/30">
    
    <div class="text-center mb-8">
      <h2 class="text-3xl font-black uppercase tracking-tighter text-white">Create Account</h2>
      <p class="text-gray-500 text-sm mt-2">Join TMDB Dash community today</p>
    </div>

    <div class="space-y-4">
      <div>
        <label class="text-[10px] uppercase font-bold text-gray-500 ml-1">Full Name</label>
        <input [(ngModel)]="fullName" name="fullName" type="text" placeholder="Mahmoud Mousa" 
               class="w-full bg-[#1d1d1d] border border-white/10 p-3 rounded-xl outline-none focus:border-blue-500 transition-all text-sm text-white">
      </div>

      <div>
        <label class="text-[10px] uppercase font-bold text-gray-500 ml-1">Email Address</label>
        <input [(ngModel)]="email" name="email" type="email" placeholder="name@company.com" 
               class="w-full bg-[#1d1d1d] border border-white/10 p-3 rounded-xl outline-none focus:border-blue-500 transition-all text-sm text-white">
      </div>
      
      <div class="grid grid-cols-2 gap-4">
        <div>
          <label class="text-[10px] uppercase font-bold text-gray-500 ml-1">Password</label>
          <input [(ngModel)]="password" type="password" name="password" type="password" placeholder="••••••••" 
                 class="w-full bg-[#1d1d1d] border border-white/10 p-3 rounded-xl outline-none focus:border-blue-500 transition-all text-sm text-white">
        </div>
        <div>
          <label class="text-[10px] uppercase font-bold text-gray-500 ml-1">Confirm</label>
          <input [(ngModel)]="confirmPassword" type="password" name="confirm" type="password" placeholder="••••••••" 
                 class="w-full bg-[#1d1d1d] border border-white/10 p-3 rounded-xl outline-none focus:border-blue-500 transition-all text-sm text-white">
        </div>
      </div>

      <button (click)="onRegister()" [disabled]="isLoading()" class="w-full bg-blue-500 text-black font-black py-3 rounded-xl uppercase hover:bg-blue-400 hover:shadow-[0_0_20px_rgba(34,197,94,0.3)] transition-all mt-4">
  {{ isLoading() ? 'Creating Account...' : 'Create Account' }}
      </button>
      @if (errorMessage()) {
  <p class="text-red-500 text-xs mt-4 text-center italic">{{ errorMessage() }}</p>
}
    </div>

    <p class="text-center text-gray-500 text-xs mt-6">
      Already have an account? 
      <a routerLink="/login" class="text-blue-500 hover:underline font-bold cursor-pointer">Login here</a>
    </p>

    <div class="relative my-8">
      <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-white/5"></div></div>
      <div class="relative flex justify-center text-xs uppercase"><span class="bg-[#282828] px-2 text-gray-600">Or sign up with</span></div>
    </div>

    <button (click)="authService.loginWithGoogle()" 
            class="w-full flex items-center justify-center gap-3 bg-[#1d1d1d] border border-white/10 text-white font-bold py-3 rounded-xl hover:bg-white hover:text-black transition-all group">
      <svg class="w-5 h-5 group-hover:scale-110 transition-transform" viewBox="0 0 24 24">
        <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
        <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
        <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
        <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
      </svg>
      Google
    </button>
  </div>
</div>
